 workflows:
   pwa-android:
       name: Build Enjoy APK
           max_build_duration: 60

               environment:
                     android_signing:
                             - keystore_reference

                                 scripts:
                                       - name: Install dependencies
                                               script: |
                                                         npm install

                                                               - name: Sync Capacitor
                                                                       script: |
                                                                                 npx cap sync android

                                                                                       - name: Build Android APK
                                                                                               script: |
                                                                                                         cd android
                                                                                                                   ./gradlew assembleDebug

                                                                                                                       artifacts:
                                                                                                                             - android/app/build/outputs/apk/debug/*.apk
