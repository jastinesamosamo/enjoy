 workflows:
   pwa-android:
       name: Build Enjoy APK
           max_build_duration: 60

               environment:
                     vars:
                             PACKAGE_NAME: "com.enjoy.app"

                                 scripts:
                                       - name: Install dependencies
                                               script: |
                                                         npm install

                                                               - name: Build Android APK
                                                                       script: |
                                                                                 npm install -g @bubblewrap/cli
                                                                                           bubblewrap init --manifest=https://jastinesamosamo.github.io/enjoy/manifest.json
                                                                                                     bubblewrap build

                                                                                                         artifacts:
                                                                                                               - "**/app-release.apk"
                                                                                                              
