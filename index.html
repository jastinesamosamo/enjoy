<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Enjoy - Internet & Network Support</title>

                <link rel="stylesheet" href="dotto.css">
                </head>

                <body>

                    <!-- HEADER -->
                        <header class="header">
                                <h1>ENJOY</h1>
                                        <p>Internet & Network Support System</p>
                                            </header>

                                                <!-- LOGIN SECTION -->
                                                    <section id="loginSection" class="container">

                                                            <h2>Login</h2>

                                                                    <div class="input-group">
                                                                                <label>Email</label>
                                                                                            <input type="email" id="loginEmail" placeholder="Enter email">
                                                                                                    </div>

                                                                                                            <div class="input-group">
                                                                                                                        <label>Password</label>
                                                                                                                                    <input type="password" id="loginPassword" placeholder="Enter password">
                                                                                                                                            </div>

                                                                                                                                                    <button id="loginBtn">Login</button>

                                                                                                                                                            <p class="switch-text">
                                                                                                                                                                        Don't have an account?
                                                                                                                                                                                    <a href="#" id="showRegister">Register</a>
                                                                                                                                                                                            </p>

                                                                                                                                                                                                </section>
                                                                                                                                                                                                        <!-- REGISTER SECTION -->
                                                                                                                                                                                                            <section id="registerSection" class="container" style="display:none;">

                                                                                                                                                                                                                    <h2>Register</h2>

                                                                                                                                                                                                                            <div class="input-group">
                                                                                                                                                                                                                                        <label>Full Name</label>
                                                                                                                                                                                                                                                    <input type="text" id="fullName" placeholder="Enter full name">
                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                    <div class="input-group">
                                                                                                                                                                                                                                                                                <label>Gender</label>
                                                                                                                                                                                                                                                                                            <select id="gender">
                                                                                                                                                                                                                                                                                                            <option value="">Select gender</option>
                                                                                                                                                                                                                                                                                                                            <option value="Male">Male</option>
                                                                                                                                                                                                                                                                                                                                            <option value="Female">Female</option>
                                                                                                                                                                                                                                                                                                                                                        </select>
                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                        <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                    <label>Email</label>
                                                                                                                                                                                                                                                                                                                                                                                                <input type="email" id="email" placeholder="Enter email">
                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                            <label>Phone Number</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="tel" id="phone" placeholder="Enter phone number">
                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label>Birth Date</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="date" id="birthdate">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label>Password</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="password" id="password" placeholder="Create password">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <label>Confirm Password</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="password" id="confirmPassword" placeholder="Confirm password">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button id="registerBtn">Register</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <p class="switch-text">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    Already have an account?
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <a href="#" id="showLogin">Login</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </section>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <!-- DASHBOARD SECTION -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <section id="dashboardSection" class="container" style="display:none;">

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h2>Dashboard</h2>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    Welcome, <span id="userEmail"></span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </p>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <label>Phone Number</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="text" id="dashPhone" placeholder="Your phone number">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label>Age</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="number" id="age" placeholder="Your age">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <label>Gender</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input type="text" id="dashGender" disabled>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label>Category</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <select id="category">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="">Select problem type</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="Internet Problem">Internet Problem</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="WiFi Problem">WiFi Problem</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="Mobile Data">Mobile Data</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="Network Configuration">Network Configuration</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="Website Problem">Website Problem</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="Other">Other</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="input-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label>Describe Your Problem</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <textarea id="problem" rows="5" placeholder="Explain your internet/network issue..."></textarea>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button id="submitBtn">Submit Request</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button id="logoutBtn">Logout</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </section>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- LINK JAVASCRIPT -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script src="dotto.js"></script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
