<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Reset Password - Enjoy</title>

        <style>
            body{
            	      font-family: Arial, sans-serif;
            	            background:#f4f4f4;
            	                  display:flex;
            	                        justify-content:center;
            	                              align-items:center;
            	                                    height:100vh;
            	                                          margin:0;
            	                                              }

            	                                                  .box{
            	                                                  	      background:white;
            	                                                  	            padding:25px;
            	                                                  	                  border-radius:10px;
            	                                                  	                        width:320px;
            	                                                  	                              box-shadow:0 5px 15px rgba(0,0,0,.2);
            	                                                  	                                  }

            	                                                  	                                      h2{
            	                                                  	                                      	      text-align:center;
            	                                                  	                                      	          }

            	                                                  	                                      	              input{
            	                                                  	                                      	              	      width:100%;
            	                                                  	                                      	              	            padding:10px;
            	                                                  	                                      	              	                  margin:10px 0;
            	                                                  	                                      	              	                        box-sizing:border-box;
            	                                                  	                                      	              	                            }

            	                                                  	                                      	              	                                button{
            	                                                  	                                      	              	                                	      width:100%;
            	                                                  	                                      	              	                                	            padding:10px;
            	                                                  	                                      	              	                                	                  border:none;
            	                                                  	                                      	              	                                	                        background:#007bff;
            	                                                  	                                      	              	                                	                              color:white;
            	                                                  	                                      	              	                                	                                    cursor:pointer;
            	                                                  	                                      	              	                                	                                          border-radius:5px;
            	                                                  	                                      	              	                                	                                              }

            	                                                  	                                      	              	                                	                                                  button:hover{
            	                                                  	                                      	              	                                	                                                  	      background:#0056b3;
            	                                                  	                                      	              	                                	                                                  	          }
            	                                                  	                                      	              	                                	                                                  	            </style>
            	                                                  	                                      	              	                                	                                                  	            </head>

            	                                                  	                                      	              	                                	                                                  	            <body>

            	                                                  	                                      	              	                                	                                                  	            <div class="box">

            	                                                  	                                      	              	                                	                                                  	            <h2>Reset Password</h2>

            	                                                  	                                      	              	                                	                                                  	            <input
            	                                                  	                                      	              	                                	                                                  	            type="password"
            	                                                  	                                      	              	                                	                                                  	            id="newPassword"
            	                                                  	                                      	              	                                	                                                  	            placeholder="New Password">

            	                                                  	                                      	              	                                	                                                  	            <input
            	                                                  	                                      	              	                                	                                                  	            type="password"
            	                                                  	                                      	              	                                	                                                  	            id="confirmPassword"
            	                                                  	                                      	              	                                	                                                  	            placeholder="Confirm Password">

            	                                                  	                                      	              	                                	                                                  	            <button id="savePassword">
            	                                                  	                                      	              	                                	                                                  	            Save New Password
            	                                                  	                                      	              	                                	                                                  	            </button>

            	                                                  	                                      	              	                                	                                                  	            </div>

            	                                                  	                                      	              	                                	                                                  	            <script type="module" src="reset-password.js"></script>

            	                                                  	                                      	              	                                	                                                  	            </body>
            	                                                  	                                      	              	                                	                                                  	            </html>
